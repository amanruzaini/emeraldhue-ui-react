<!DOCTYPE html>
<html lang="en" data-theme="theme-light" data-text-resize="text-resize-100">

<head>
    <meta charset="UTF-8" />
    <title>EH Token Smoke Test</title>
    <link rel="stylesheet" href="./input.css" />
    <style>
        body {
            font-family: var(--eh-font-type-default);
            padding: 2rem;
            background: var(--eh-colour-bg-default);
        }

        .swatch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .swatch {
            padding: 1rem;
            border-radius: var(--eh-border-radius-md);
            border: 1px solid var(--eh-colour-border-default);
        }

        .swatch-label {
            font-size: var(--eh-font-size-body-sm);
            color: var(--eh-colour-text-weak);
            margin-bottom: 0.5rem;
        }

        .swatch-value {
            font-size: var(--eh-font-size-body-md);
            color: var(--eh-colour-text-default);
            font-weight: var(--eh-font-weight-medium);
        }

        .bg-primary-swatch {
            background: var(--eh-colour-bg-brand);
            color: var(--eh-colour-text-all-white);
            padding: 1rem;
            border-radius: var(--eh-border-radius-md);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding: 1rem;
            background: var(--eh-colour-bg-neutral-container);
            border-radius: var(--eh-border-radius-md);
        }

        button {
            padding: 0.5rem 1rem;
            border-radius: var(--eh-border-radius-sm);
            border: 1px solid var(--eh-colour-border-default);
            background: var(--eh-colour-bg-default);
            color: var(--eh-colour-text-default);
            cursor: pointer;
            font-size: var(--eh-font-size-body-sm);
        }

        button.active {
            background: var(--eh-colour-bg-brand);
            color: var(--eh-colour-text-all-white);
            border-color: var(--eh-colour-bg-brand);
        }

        h2 {
            font-size: var(--eh-font-size-heading-4);
            color: var(--eh-colour-text-strong);
            margin: 1.5rem 0 0.75rem;
        }

        .shadcn-bridge {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .bridge-item {
            padding: 0.75rem;
            border-radius: var(--eh-border-radius-sm);
            font-size: var(--eh-font-size-body-xs);
        }
    </style>
</head>

<body>

    <h2>Theme switcher</h2>
    <div class="controls" id="theme-controls">
        <button onclick="setTheme('theme-light')" class="active">Light</button>
        <button onclick="setTheme('theme-dark')">Dark</button>
        <button onclick="setTheme('theme-light-high-contrast')">HC Light</button>
        <button onclick="setTheme('theme-dark-high-contrast')">HC Dark</button>
        <button onclick="setTheme('theme-light-colour-blind')">CB Light</button>
        <button onclick="setTheme('theme-dark-colour-blind')">CB Dark</button>
    </div>

    <h2>Text resize</h2>
    <div class="controls" id="resize-controls">
        <button onclick="setResize('text-resize-75')">75%</button>
        <button onclick="setResize('text-resize-100')" class="active">100%</butto
